<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Álbum Digital - Livro Interativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@300;400;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #2c3e50;
            background-image: radial-gradient(#34495e 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .book-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 100px);
            margin: 20px 0;
        }

        .page {
            padding: 20px;
            background-color: #fdfdfd;
            box-shadow: inset 5px 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            border: 1px solid #e2e8f0;
            cursor: pointer;
        }

        .page-cover {
            background-color: #1e293b;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .page-cover h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
        }

        .photo-frame {
            border: 10px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            height: 75%;
            width: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .page-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            pointer-events: none;
        }

        .page-number {
            position: absolute;
            bottom: 10px;
            font-size: 12px;
            color: #94a3b8;
        }

        .modal {
            display: none;
            z-index: 100;
        }
        .modal.active {
            display: flex;
        }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-white/10 backdrop-blur-md border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center text-white">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-book-open text-blue-400"></i>
                Memórias Digitais
            </h1>
            <div class="flex gap-4">
                <button onclick="resetAlbum()" class="hover:text-red-400 transition-colors" title="Limpar Tudo">
                    <i class="fas fa-trash-alt"></i>
                </button>
                <button onclick="toggleUploadModal()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-full text-sm font-bold transition-all shadow-lg active:scale-95">
                    + Adicionar Página
                </button>
            </div>
        </div>
    </header>

    <div class="book-container">
        <div id="book" class="mx-auto shadow-2xl">
            <div class="page page-cover" data-density="hard">
                <div class="border-2 border-white/20 p-8 m-4 rounded-lg pointer-events-none">
                    <i class="fas fa-heart text-red-400 text-4xl mb-6"></i>
                    <h2>O Meu Álbum</h2>
                    <p class="mt-4 opacity-60 uppercase tracking-widest text-xs">Coleção de Momentos</p>
                </div>
            </div>

            <div class="page">
                <div class="page-content">
                    <img src="mycael.jpg" class="photo-frame" alt="Foto">
                    <p class="font-serif italic text-slate-600">Este momento especial...</p>
                </div>
                <span class="page-number right-5">1</span>
            </div>

            <div class="page">
                <div class="page-content">
                    <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=800&q=80" class="photo-frame">
                    <p class="font-serif italic text-slate-600">A paz que encontramos juntos.</p>
                </div>
                <span class="page-number left-5">2</span>
            </div>

            <div class="page">
                <div class="page-content">
                    <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=800&q=80" class="photo-frame">
                    <p class="font-serif italic text-slate-600">Aventuras na floresta encantada.</p>
                </div>
                <span class="page-number right-5">3</span>
            </div>

            <div class="page">
                <div class="page-content">
                    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=800&q=80" class="photo-frame">
                    <p class="font-serif italic text-slate-600">Pôr do sol à beira mar.</p>
                </div>
                <span class="page-number left-5">4</span>
            </div>

            <div class="page">
                <div class="page-content">
                    <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=800&q=80" class="photo-frame">
                    <p class="font-serif italic text-slate-600">O topo do mundo.</p>
                </div>
                <span class="page-number right-5">5</span>
            </div>

            <div class="page">
                <div class="page-content">
                    <img src="https://images.unsplash.com/photo-1532270660266-d519abd0189d?auto=format&fit=crop&w=800&q=80" class="photo-frame">
                    <p class="font-serif italic text-slate-600">Cores de outono.</p>
                </div>
                <span class="page-number left-5">6</span>
            </div>

            <div class="page page-cover" data-density="hard">
                <div class="opacity-30 pointer-events-none">FIM</div>
            </div>
        </div>
    </div>

    <div id="uploadModal" class="modal fixed inset-0 bg-black/80 items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden text-slate-800">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-xl font-bold">Nova Memória</h3>
                <button onclick="toggleUploadModal()" class="text-slate-400 hover:text-slate-600">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Selecionar Imagem</label>
                    <input type="file" id="fileInput" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700 cursor-pointer">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Legenda da Página</label>
                    <input type="text" id="photoCaption" placeholder="Escreva algo especial..." class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="pt-4 flex gap-3">
                    <button onclick="toggleUploadModal()" class="flex-1 py-2 text-slate-500 font-medium">Cancelar</button>
                    <button id="saveBtn" onclick="handleAddPhoto()" class="flex-1 py-2 bg-blue-600 text-white rounded-lg font-bold shadow-lg shadow-blue-200">Adicionar ao Livro</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let pageFlip = null;
        const bookElement = document.getElementById('book');
        const uploadModal = document.getElementById('uploadModal');

        function initBook() {
            pageFlip = new St.PageFlip(bookElement, {
                width: 450,
                height: 600,
                size: "stretch",
                minWidth: 315,
                maxWidth: 1000,
                minHeight: 420,
                maxHeight: 1350,
                maxShadowOpacity: 0.5,
                showCover: true,
                mobileScrollSupport: false,
                useMouseEvents: true,
                clickEventForward: true
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
        }

        function toggleUploadModal() {
            uploadModal.classList.toggle('active');
        }

        function handleAddPhoto() {
            const fileInput = document.getElementById('fileInput');
            const captionInput = document.getElementById('photoCaption');
            const file = fileInput.files[0];

            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const newPage = document.createElement('div');
                newPage.className = 'page';
                const pageNum = pageFlip.getPageCount();

                newPage.innerHTML = `
                    <div class="page-content">
                        <img src="${e.target.result}" class="photo-frame">
                        <p class="font-serif italic text-slate-600">${captionInput.value || "Novo momento..."}</p>
                    </div>
                    <span class="page-number ${pageNum % 2 === 0 ? 'right-5' : 'left-5'}">${pageNum - 1}</span>
                `;

                const pages = document.querySelectorAll('.page');
                const lastPage = pages[pages.length - 1];
                bookElement.insertBefore(newPage, lastPage);

                pageFlip.destroy();
                initBook();

                toggleUploadModal();
                fileInput.value = '';
                captionInput.value = '';

                pageFlip.flip(pageNum - 1);
            };
            reader.readAsDataURL(file);
        }

        function resetAlbum() {
            if(confirm("Deseja apagar as fotos adicionadas? (As fotos de exemplo permanecerão)")) {
                window.location.reload();
            }
        }

        window.onload = initBook;

        window.onresize = () => {
            if (pageFlip) pageFlip.update();
        };

        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") pageFlip.flipNext();
            if (e.key === "ArrowLeft") pageFlip.flipPrev();
        });
    </script>
</body>
</html>
